<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — МедТрекер</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="auth-wrapper">
  <div style="width:100%;max-width:420px">
    <div class="auth-logo">
      <div class="logo-box"><i class="ti ti-pill"></i></div>
      <div class="auth-title">МедТрекер</div>
      <div class="auth-sub">Создайте аккаунт</div>
    </div>

    <div class="auth-card">
      <div class="tab-switcher">
        <a class="tab-btn" href="{{ url_for('auth.login') }}"
           style="display:flex;align-items:center;justify-content:center;">Вход</a>
        <div class="tab-btn active">Регистрация</div>
      </div>

      {% if error %}
      <div class="alert alert-error" style="margin-bottom:14px">
        <i class="ti ti-alert-circle"></i>
        <div class="alert-body">{{ error }}</div>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
          <label class="form-label">Полное имя</label>
          <input class="form-control" type="text" name="full_name"
                 placeholder="Иванов Иван Иванович" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" name="email"
                 placeholder="user@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input class="form-control" type="password" name="password"
                 placeholder="••••••••" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">Роль</label>
          <div class="role-selector" id="roleSelector">
            <div class="role-btn active" data-role="doctor" onclick="selectRole('doctor')">
              <i class="ti ti-stethoscope"></i>
              <span>Врач</span>
            </div>
            <div class="role-btn" data-role="patient" onclick="selectRole('patient')">
              <i class="ti ti-user"></i>
              <span>Пациент</span>
            </div>
          </div>
          <input type="hidden" name="role" id="roleInput" value="doctor">
        </div>
        <button class="btn btn-primary btn-full" type="submit" style="margin-top:4px">
          Создать аккаунт
        </button>
      </form>

      <hr class="divider">
      <p style="text-align:center;font-size:13px;color:var(--color-text-tertiary)">
        Уже есть аккаунт?
        <a href="{{ url_for('auth.login') }}"
           style="color:var(--color-text-primary);font-weight:600">Войти</a>
      </p>
    </div>
  </div>
</div>
<script>
function selectRole(role) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-role="' + role + '"]').classList.add('active');
  document.getElementById('roleInput').value = role;
}
</script>
</body>
</html>
